<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="caseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="caseGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a8d4"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Case shadow -->
  <rect x="55" y="35" width="90" height="200" rx="20" fill="rgba(0,0,0,0.1)"/>
  <!-- Case body -->
  <rect x="50" y="30" width="90" height="200" rx="20" fill="url(#caseGrad)"/>
  <rect x="55" y="35" width="80" height="190" rx="16" fill="url(#caseGrad2)"/>
  
  <!-- Camera cutout -->
  <rect x="65" y="50" width="50" height="50" rx="12" fill="#1e293b"/>
  <circle cx="80" cy="68" r="7" fill="#0f172a"/>
  <circle cx="100" cy="68" r="7" fill="#0f172a"/>
  <circle cx="80" cy="85" r="5" fill="#0f172a"/>
  
  <!-- MagSafe ring -->
  <circle cx="95" cy="150" r="35" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="3,3" opacity="0.6"/>
  <circle cx="95" cy="150" r="25" fill="rgba(255,255,255,0.3)"/>
  
  <text x="100" y="260" text-anchor="middle" fill="#1e293b" font-family="Arial" font-size="12" font-weight="bold">Ốp MagSafe</text>
</svg>
