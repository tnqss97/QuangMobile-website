<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="n2Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#n2Bg)"/>
  <circle cx="320" cy="200" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="80" cy="50" r="50" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Headphones -->
  <g transform="translate(150, 60)">
    <!-- Case -->
    <ellipse cx="50" cy="100" rx="60" ry="40" fill="#fff"/>
    <ellipse cx="50" cy="95" rx="55" ry="35" fill="#f3f4f6"/>
    
    <!-- Earbud Left -->
    <ellipse cx="20" cy="40" rx="18" ry="22" fill="#fff"/>
    <circle cx="20" cy="35" r="8" fill="#1e293b"/>
    <ellipse cx="18" cy="60" rx="6" ry="15" fill="#fff"/>
    
    <!-- Earbud Right -->
    <ellipse cx="80" cy="40" rx="18" ry="22" fill="#fff"/>
    <circle cx="80" cy="35" r="8" fill="#1e293b"/>
    <ellipse cx="82" cy="60" rx="6" ry="15" fill="#fff"/>
  </g>
  
  <!-- Sound waves -->
  <g opacity="0.5">
    <circle cx="100" cy="125" r="20" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="100" cy="125" r="35" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="300" cy="125" r="20" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="300" cy="125" r="35" fill="none" stroke="#fff" stroke-width="2"/>
  </g>
  
  <text x="200" y="225" text-anchor="middle" fill="#fff" font-family="Arial" font-size="14" font-weight="bold">TOP TAI NGHE 2026</text>
</svg>
