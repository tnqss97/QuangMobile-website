    <line x1="50" y1="100" x2="120" y2="100"/>
    <line x1="50" y1="100" x2="120" y2="150"/>
    <line x1="50" y1="150" x2="120" y2="100"/>
    <line x1="50" y1="200" x2="120" y2="150"/>
    
    <line x1="280" y1="100" x2="350" y2="50"/>
    <line x1="280" y1="100" x2="350" y2="100"/>
    <line x1="280" y1="150" x2="350" y2="150"/>
