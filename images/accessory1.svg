<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="ap1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#e5e5e5"/>
    </linearGradient>
    <linearGradient id="apCase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f4f6"/>
      <stop offset="100%" style="stop-color:#d1d5db"/>
    </linearGradient>
  </defs>
  <!-- Case -->
  <ellipse cx="100" cy="160" rx="65" ry="50" fill="url(#apCase)"/>
  <ellipse cx="100" cy="155" rx="65" ry="50" fill="url(#ap1)"/>
  <ellipse cx="100" cy="150" rx="55" ry="40" fill="#fff" opacity="0.5"/>
  
  <!-- Earbud Left -->
  <g transform="translate(60, 80)">
    <circle cx="0" cy="0" r="18" fill="url(#ap1)"/>
    <ellipse cx="-2" cy="20" rx="8" ry="20" fill="url(#ap1)"/>
    <circle cx="0" cy="0" r="8" fill="#1e293b"/>
  </g>
  
  <!-- Earbud Right -->
  <g transform="translate(140, 80)">
    <circle cx="0" cy="0" r="18" fill="url(#ap1)"/>
    <ellipse cx="2" cy="20" rx="8" ry="20" fill="url(#ap1)"/>
    <circle cx="0" cy="0" r="8" fill="#1e293b"/>
  </g>
  
  <text x="100" y="245" text-anchor="middle" fill="#1e293b" font-family="Arial" font-size="12" font-weight="bold">AirPods Pro 2</text>
</svg>
