<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="qmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <linearGradient id="qmAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="qmShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.15"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#qmGrad)" filter="url(#qmShadow)"/>
  
  <!-- Inner highlight -->
  <rect x="4" y="4" width="56" height="28" rx="12" fill="rgba(255,255,255,0.12)"/>
  
  <!-- Phone body (forms the letter Q) -->
  <g transform="translate(20, 14)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="24" height="36" rx="5" fill="#fff"/>
    <!-- Screen -->
    <rect x="2" y="4" width="20" height="28" rx="2" fill="url(#qmGrad)"/>
    <!-- Speaker (top notch) -->
    <rect x="9" y="2" width="6" height="1.5" rx="0.75" fill="#fff" opacity="0.6"/>
    <!-- Home indicator -->
    <rect x="9" y="33" width="6" height="1.5" rx="0.75" fill="#1e293b"/>
  </g>
  
  <!-- Q tail - the distinctive accent that turns phone into "Q" -->
  <g transform="translate(40, 44)">
    <circle cx="0" cy="0" r="6" fill="url(#qmAccent)"/>
    <path d="M -3 -3 L 5 5" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Signal waves on top right (mobile signal symbol) -->
  <g transform="translate(48, 14)" opacity="0.85">
    <circle cx="0" cy="0" r="2" fill="#fbbf24"/>
    <path d="M -4 -4 Q 0 -8 4 -4" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
