      <rect x="2" y="4" width="20" height="28" rx="2" fill="url(#qmfGrad)"/>
      <rect x="9" y="2" width="6" height="1.5" rx="0.75" fill="#fff" opacity="0.6"/>
      <rect x="9" y="33" width="6" height="1.5" rx="0.75" fill="#1e293b"/>
    </g>
    <g transform="translate(40, 44)">
