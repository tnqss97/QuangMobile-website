<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="ctaPhone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#e5e7eb"/>
    </linearGradient>
  </defs>
  <!-- Sparkles -->
  <g fill="#fbbf24">
    <polygon points="40,40 45,55 60,60 45,65 40,80 35,65 20,60 35,55"/>
    <polygon points="250,50 253,60 263,63 253,66 250,76 247,66 237,63 247,60"/>
    <polygon points="260,230 263,240 273,243 263,246 260,256 257,246 247,243 257,240"/>
  </g>
  
  <!-- Discount tag -->
  <g transform="translate(150, 150)">
    <circle cx="0" cy="0" r="100" fill="#fff" opacity="0.95"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="5,5"/>
    <text x="0" y="-20" text-anchor="middle" fill="#1e293b" font-family="Arial" font-size="18" font-weight="bold">SALE</text>
    <text x="0" y="20" text-anchor="middle" fill="#ef4444" font-family="Arial" font-size="48" font-weight="bold">50%</text>
    <text x="0" y="50" text-anchor="middle" fill="#1e293b" font-family="Arial" font-size="14" font-weight="bold">OFF</text>
  </g>
  
  <!-- Gift box -->
  <g transform="translate(50, 200)">
    <rect x="0" y="20" width="50" height="40" fill="#ef4444"/>
    <rect x="0" y="15" width="50" height="10" fill="#fbbf24"/>
    <rect x="22" y="15" width="6" height="45" fill="#fbbf24"/>
    <path d="M 25 15 Q 15 5, 10 10 Q 5 15, 25 15 Q 45 15, 40 10 Q 35 5, 25 15" fill="#fbbf24"/>
  </g>
</svg>
