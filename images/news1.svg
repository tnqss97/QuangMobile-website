<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="n1Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#n1Bg)"/>
  <!-- Decorative circles -->
  <circle cx="350" cy="50" r="60" fill="rgba(255,255,255,0.1)"/>
  <circle cx="50" cy="200" r="40" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Phone -->
  <g transform="translate(150, 50)">
    <rect x="0" y="0" width="100" height="180" rx="15" fill="#1e293b"/>
    <rect x="5" y="5" width="90" height="170" rx="12" fill="#fff"/>
    <rect x="40" y="5" width="20" height="8" rx="4" fill="#1e293b"/>
    <rect x="15" y="25" width="70" height="80" rx="8" fill="#667eea"/>
    <text x="50" y="65" text-anchor="middle" fill="#fff" font-family="Arial" font-size="20" font-weight="bold">16</text>
    <text x="50" y="85" text-anchor="middle" fill="#fff" font-family="Arial" font-size="9">Pro Max</text>
    <rect x="15" y="115" width="35" height="35" rx="8" fill="#fbbf24"/>
    <rect x="55" y="115" width="35" height="35" rx="8" fill="#10b981"/>
  </g>
  
  <!-- Apple-like badge -->
  <g transform="translate(20, 30)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="rgba(255,255,255,0.2)"/>
    <text x="50" y="20" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">NEW APPLE</text>
  </g>
</svg>
