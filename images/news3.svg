<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="n3Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#n3Bg)"/>
  
  <!-- Rain drops -->
  <g opacity="0.6">
    <line x1="40" y1="20" x2="35" y2="50" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="70" y1="40" x2="65" y2="70" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="100" y1="20" x2="95" y2="50" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="320" y1="30" x2="315" y2="60" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="350" y1="50" x2="345" y2="80" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="380" y1="20" x2="375" y2="50" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Phone with shield -->
  <g transform="translate(150, 60)">
    <!-- Shield -->
    <path d="M 50 -10 L 110 10 L 110 70 Q 110 130, 50 160 Q -10 130, -10 70 L -10 10 Z" fill="#fff" opacity="0.3"/>
    <!-- Phone -->
    <rect x="20" y="20" width="60" height="120" rx="10" fill="#1e293b"/>
    <rect x="23" y="23" width="54" height="114" rx="8" fill="#10b981"/>
    <text x="50" y="85" text-anchor="middle" fill="#fff" font-family="Arial" font-size="30" font-weight="bold">✓</text>
  </g>
  
  <text x="200" y="225" text-anchor="middle" fill="#fff" font-family="Arial" font-size="14" font-weight="bold">BẢO VỆ ĐIỆN THOẠI</text>
</svg>
