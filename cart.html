<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - Quang Mobile</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="container">
                <a href="index.html" class="logo">
                    <span class="logo-icon"><i class="fas fa-mobile-screen-button"></i></span>
                    Quang<span>Mobile</span>
                </a>
                <ul class="nav-links">
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="products.html">Sản phẩm</a></li>
                    <li><a href="news.html">Tin tức</a></li>
                    <li><a href="contact.html">Liên hệ</a></li>
                </ul>
                <div class="nav-icons">
                    <a href="account.html" class="cart-icon" data-auth="logged-in" title="Tài khoản"><i class="fas fa-user"></i></a>
                    <a href="login.html" class="btn btn-primary" data-auth="logged-out" style="padding:10px 20px">Đăng nhập</a>
                    <a href="cart.html" class="cart-icon"><i class="fas fa-shopping-bag"></i><span class="cart-count">0</span></a>
                </div>
                <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
            </div>
        </nav>
    </header>

    <section class="page-header">
        <div class="container">
            <h1>Giỏ hàng của bạn</h1>
            <nav class="breadcrumb"><a href="index.html">Trang chủ</a> / <span>Giỏ hàng</span></nav>
        </div>
    </section>

    <section class="cart-page">
        <div class="container">
            <div id="cartContent">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin"></i> Đang tải giỏ hàng...
                </div>
            </div>
        </div>
    </section>

    <div class="toast">
        <div class="toast-icon"><i class="fas fa-check"></i></div>
        <div class="toast-message"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
